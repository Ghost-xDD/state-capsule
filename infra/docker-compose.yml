## MaintainerSwarm — 4-node AXL docker-compose
##
## Prerequisites:
##   bash infra/gen-keys.sh
##   bash infra/build-axl-linux.sh   (builds infra/bin/axl)
##   pnpm build (from repo root)
##
## Usage:
##   docker compose -f infra/docker-compose.yml up
##   docker compose -f infra/docker-compose.yml kill reproducer   # demo kill
##   docker compose -f infra/docker-compose.yml up -d reproducer  # demo resume

services:
  triager:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent
    container_name: mswarm-triager
    env_file: ../.env
    restart: "no"
    environment:
      AGENT_ROLE: triager
      AXL_API_PORT: "9101"
      AXL_LISTEN_PORT: "9111"
    volumes:
      - ./keys/triager.pem:/app/private.pem:ro
      - ./axl/triager-config.json:/app/axl-config.json:ro
      - peers:/peers
    ports:
      - "9111:9111"
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:9101/topology > /dev/null && test -f /peers/triager"]
      interval: 3s
      timeout: 3s
      retries: 20

  reproducer:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent
    container_name: mswarm-reproducer
    env_file: ../.env
    restart: "no"
    environment:
      AGENT_ROLE: reproducer
      AXL_API_PORT: "9102"
      AXL_LISTEN_PORT: "9112"
    volumes:
      - ./keys/reproducer.pem:/app/private.pem:ro
      - ./axl/reproducer-config.json:/app/axl-config.json:ro
      - peers:/peers
    ports:
      - "9112:9112"
    depends_on:
      triager:
        condition: service_healthy

  patcher:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent
    container_name: mswarm-patcher
    env_file: ../.env
    restart: "no"
    environment:
      AGENT_ROLE: patcher
      AXL_API_PORT: "9103"
      AXL_LISTEN_PORT: "9113"
    volumes:
      - ./keys/patcher.pem:/app/private.pem:ro
      - ./axl/patcher-config.json:/app/axl-config.json:ro
      - peers:/peers
    ports:
      - "9113:9113"
    depends_on:
      triager:
        condition: service_healthy

  reviewer:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent
    container_name: mswarm-reviewer
    env_file: ../.env
    restart: "no"
    environment:
      AGENT_ROLE: reviewer
      AXL_API_PORT: "9104"
      AXL_LISTEN_PORT: "9114"
    volumes:
      - ./keys/reviewer.pem:/app/private.pem:ro
      - ./axl/reviewer-config.json:/app/axl-config.json:ro
      - peers:/peers
    ports:
      - "9114:9114"
    depends_on:
      triager:
        condition: service_healthy

networks:
  default:
    driver: bridge

volumes:
  peers:
